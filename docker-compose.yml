services:
  db:
    image: postgres:16-alpine
    container_name: pawnscan-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pawnscan}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${POSTGRES_DB:-pawnscan}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend/pawnscan
      dockerfile: Dockerfile
    container_name: pawnscan-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-pawnscan}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      JWT_SECRET: ${JWT_SECRET:-ReplaceWithASecureRandomSecretKeyOfAtLeast32Chars!}
      UPLOAD_BASE_DIR: ${UPLOAD_BASE_DIR:-uploads}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-smtp.sendgrid.net}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-apikey}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-${SENDGRID_API_KEY:-}}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SMTP_AUTH: ${SMTP_AUTH:-true}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-true}
      SMTP_STARTTLS_REQUIRED: ${SMTP_STARTTLS_REQUIRED:-false}
      SMTP_SSL_TRUST: ${SMTP_SSL_TRUST:-smtp.sendgrid.net}
      APP_MAIL_FROM: ${APP_MAIL_FROM:-pawnscan1@gmail.com}
    ports:
      - "8080:8080"
    volumes:
      - backend_uploads:/app/uploads

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: pawnscan-web
    depends_on:
      - backend
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://backend:8080}
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:8080}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  backend_uploads:
