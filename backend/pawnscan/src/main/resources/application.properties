# Application properties for Pawnscan
server.port=8080

# Datasource - PostgreSQL
# Use environment variables: DB_URL, DB_USERNAME, DB_PASSWORD
# Defaults provided for local development; override via env vars
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/pawnscan}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000

# JWT settings - replace the secret with a secure random value in production
jwt.secret=${JWT_SECRET:dev-secret-key-change-in-production}
jwt.expiration-ms=86400000

# Report upload settings
app.upload.base-dir=${UPLOAD_BASE_DIR:uploads}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
