# Application properties for Pawnscan
server.port=8080

# Load env files whether the app is launched from the repo root or backend/pawnscan.
spring.config.import=optional:file:.env[.properties],optional:file:../../.env[.properties]

# Datasource - PostgreSQL
# Use environment variables: DB_URL, DB_USERNAME, DB_PASSWORD
# Defaults provided for local development; override via env vars
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/pawnscan}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000

# JWT settings - replace the secret with a secure random value in production
jwt.secret=${JWT_SECRET:dev-secret-key-change-in-production}
jwt.expiration-ms=86400000

# Google OAuth settings
# Use the Web application OAuth client ID here. Android Google Sign-In uses this
# as the server client ID when requesting an ID token for the backend.
google.web-client-id=${GOOGLE_WEB_CLIENT_ID:${GOOGLE_CLIENT_ID:}}
google.client-secret=${GOOGLE_CLIENT_SECRET:}

# SMTP settings
spring.mail.host=${SMTP_HOST:smtp.sendgrid.net}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:apikey}
spring.mail.password=${SMTP_PASSWORD:${SENDGRID_API_KEY:}}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.starttls.required=${SMTP_STARTTLS_REQUIRED:false}
spring.mail.properties.mail.smtp.ssl.trust=${SMTP_SSL_TRUST:${SMTP_HOST:smtp.sendgrid.net}}
spring.mail.properties.mail.smtp.connectiontimeout=${SMTP_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${SMTP_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${SMTP_WRITE_TIMEOUT:5000}
app.mail.from=${APP_MAIL_FROM:pawnscan1@gmail.com}

# Report upload settings
app.upload.base-dir=${UPLOAD_BASE_DIR:uploads}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Public stolen-item lookup used by the verification tool.
# Bike Index exposes an open REST API for stolen bicycle serial checks.
app.public-stolen-api.bike-index-base-url=${BIKE_INDEX_API_BASE_URL:https://bikeindex.org/api/v3}

# Firebase credentials string from env
pawnscan.firebase.credentials=${FIREBASE_CREDENTIALS:}
