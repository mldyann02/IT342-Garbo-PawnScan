# Application properties for Pawnscan
server.port=8080

# Datasource placeholder (edit to match your DB)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=updatespring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000

server.port=8080

# JWT settings - replace the secret with a secure random value in production
# Reads JWT_SECRET env var; falls back to the placeholder if not set
jwt.secret=${JWT_SECRET:ReplaceWithASecureRandomSecretKeyOfAtLeast32Chars!}
jwt.expiration-ms=86400000